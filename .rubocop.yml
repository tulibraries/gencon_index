AllCops:
  NewCops: enable
  TargetRubyVersion: 3.3
  UseCache: false
  SuggestExtensions: false
  Exclude:
    - bin/**
    - vendor/**

Style/Documentation:
  Enabled: false

Style/StringLiterals:
  EnforcedStyle: double_quotes

Style/WordArray:
  Enabled: false

Bundler/OrderedGems:
  Enabled: false

Metrics/BlockLength:
  Exclude:
    - spec/**

Metrics/MethodLength:
  Max: 25

Metrics/AbcSize:
  Max: 30
